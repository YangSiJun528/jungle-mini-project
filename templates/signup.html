{% extends "base.html" %}

{% block title %}회원가입{% endblock %}

{% block style %}
.login-section {
margin-top: 100px;
}
{% endblock %}

{% block content %}

<body>
    <div class="row justify-content-center login-section">
        <div class="col-12 col-md-6 col-lg-4 p-3">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h3 class="card-title text-center mb-4">회원가입</h3>
                    <form action="/signup" method="POST">
                        <div class="mb-3">
                            <label for="login_id" class="form-label">아이디</label>
                            <input type="text" class="form-control" id="login_id" name="login_id"
                                placeholder="ID를 입력하세요" required>
                        </div>

                        <div class="mb-3">
                            <label for="username" class="form-label">사용자 이름</label>
                            <input type="text" class="form-control" id="username" name="username"
                                placeholder="성함을 입력하세요" required>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">비밀번호</label>
                            <input type="password" class="form-control" id="password" name="password" placeholder="비밀번호"
                                required>
                        </div>

                        <div class="mb-4">
                            <label for="confirm_password" class="form-label">비밀번호 확인</label>
                            <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                                placeholder="비밀번호를 다시 입력하세요" required>
                        </div>

                        <div class="d-grid">
                            <button id="btn-signup" type="submit" class="btn btn-primary btn-lg">회원가입 하기</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    {% endblock %}
