{% extends "base.html" %}

{% block title %}로그인{% endblock %}

{% block style %}
.login-section {
margin-top: 100px;
}
{% endblock %}

{% block content %}

<body>
    <div class="row justify-content-center login-section">
        <div class="col-12 col-md-6 col-lg-4 p-3">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h3 class="card-title text-center mb-4">로그인</h3>

                    <form action="/login" method="POST">
                        <div class="mb-3">
                            <label for="login_id" class="form-label">아이디</label>
                            <input type="text" class="form-control" id="login_id" name="login_id"
                                placeholder="ID를 입력하세요" required />
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label">비밀번호</label>
                            <input type="password" class="form-control" id="password" name="password"
                                placeholder="비밀번호를 입력하세요" required />
                        </div>

                        <div class="d-grid">
                            <button id="btn-login" type="submit" class="btn btn-primary btn-lg">
                                로그인
                            </button>
                        </div>
                    </form>

                    <div class="text-center mt-3">
                        <a href="/signup" class="text-decoration-none ms-1">회원가입</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    {% endblock %}
