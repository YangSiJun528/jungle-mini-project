<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>로그인</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .login-card {
            max-width: 300px;
            margin: 100px auto;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card login-card shadow-sm">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-4">로그인</h3>

                {% with messages = get_flashed_messages() %}
                {% if messages %}
                <div class="alert alert-danger" role="alert">
                    {{ messages[0] }}
                </div>
                {% endif %}
                {% endwith %}

                <form action="/login" method="POST">
                    <div class="mb-3">
                        <label for="login_id" class="form-label">아이디</label>
                        <input type="text" class="form-control" id="login_id" name="login_id" placeholder="ID를 입력하세요"
                            required />
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label">비밀번호</label>
                        <input type="password" class="form-control" id="password" name="password"
                            placeholder="비밀번호를 입력하세요" required />
                    </div>

                    <div class="d-grid">
                        <button id="btn-login" type="submit" class="btn btn-primary btn-lg">
                            로그인
                        </button>
                    </div>
                </form>

                <div class="text-center mt-3">
                    <a href="/signup" class="text-decoration-none ms-1">회원가입</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
