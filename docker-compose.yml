services:
  web:
    build: .
    ports:
      - "5001:5001"
    environment:
      - MONGO_HOST=mongo
      - PYTHONUNBUFFERED=1
    depends_on:
      - mongo
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
