{% extends "base.html" %}
{% block content %}

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
      <div class="card shadow-sm">
        <div class="card-body p-4">

          <h5 class="mb-4">프로젝트 등록</h5>

          <form action="/projects" method="POST">

            <!-- 제목 -->
            <div class="mb-3">
              <label for="title" class="form-label">제목</label>
              <input id="title" name="title" class="form-control" placeholder="제목을 입력해주세요">
            </div>

            <!-- 설명 -->
            <div class="mb-3">
              <label for="content" class="form-label">설명</label>
              <textarea id="content" name="content" class="form-control" rows="4" placeholder="설명"></textarea>
            </div>

            <!-- URL -->
            <div class="mb-3">
              <label for="url" class="form-label">서비스 URL</label>
              <input id="url" name="url" class="form-control" placeholder="귀하의 서비스의 url을 입력">
            </div>

            <!-- URL -->
            <div class="mb-3">
              <label for="expired_date">만료기일</label>
              <input type="date" id="expired_date" name="expired_date" required>
            </div>

            <!-- 태그 -->
            <div class="mb-3">
              <label for="tags" class="form-label">태그</label>
              <input id="tags" name="tags" class="form-control" placeholder="#태그1 #태그2">
              <div class="form-text">예: #python #flask 처럼 입력</div>
            </div>
            

            <!-- 테스트케이스 -->
            <div class="mb-2 d-flex align-items-center justify-content-between">
              <label class="form-label mb-0">테스트케이스</label>
              <button type="button" class="btn btn-sm btn-outline-secondary" onclick="addTestcase()">추가</button>
            </div>

            <div id="testcase-container" class="mb-3">
              <div class="mb-2">
                <input name="testcases[]" class="form-control" placeholder="테스트케이스1">
              </div>
            </div>

            <button class="btn btn-primary w-100" type="submit">등록</button>

          </form>

        </div>
      </div>
    </div>
  </div>
</div>

<script>
let testcaseCount = 1;

function addTestcase() {
  testcaseCount++;

  const container = document.getElementById("testcase-container");

  // Bootstrap 간격을 주기 위해 div로 한번 감싸는 게 깔끔함
  const wrapper = document.createElement("div");
  wrapper.className = "mb-2";

  const input = document.createElement("input");
  input.name = "testcases[]";
  input.placeholder = "테스트케이스" + testcaseCount;
  input.className = "form-control"; // ★ 이게 핵심

  wrapper.appendChild(input);
  container.appendChild(wrapper);
}
</script>

{% endblock %}
